name: apply-round5
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/ecstatic-thompson-vUFsS
          fetch-depth: 0
      - name: apply and push
        run: |
          set -euo pipefail
          echo "d67e384e571ac539244cc79cd145b025b8032d4a3a879bdd3eff0e5a4d6199a7  patches/round5.patch" | sha256sum -c -
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          cp patches/round5.patch /tmp/p.patch
          cat > /tmp/msg <<'EOF'
          Timeline: a bucket dim that returns blank values falls through to raw

          Looker can ACCEPT a minuteN timeframe without a 400 yet return null
          for it on every row (created_at_minute10 on the check-ins family) -
          the read was accepted, every row was dropped at bucketing, and the
          raw fallback never got a turn. Blank buckets are now their own soft
          failure that jumps straight to the next bucket shape regardless of
          measure.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          EOF
          sed -i 's/^          //' /tmp/msg
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/p.patch
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git checkout claude/looker-data-monitoring-jeo2l9 -- server/dataHealth.js test/dataHealth.test.js
          git commit -F /tmp/msg
          git push origin main || { git pull --rebase origin main && git push origin main; }
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round5.patch .github/workflows/apply-round5.yml
          git commit -m "chore: remove one-shot apply helper"
          git push origin claude/ecstatic-thompson-vUFsS
