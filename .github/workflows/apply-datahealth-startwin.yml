name: Apply data-health timeline start window
# ONE-SHOT helper (same pattern as the earlier data-health jobs): the authoring
# session can only write through the GitHub API, so this applies the reviewed
# patch to the feature branch, copies the resulting data-health files onto main,
# then deletes itself from this (default) branch. Safe to delete by hand if it
# ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply to feature branch, sync main, then self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-startwin.patch /tmp/d.patch
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index /tmp/d.patch
          git commit -m 'Data health timeline: window anchored to the roster start time' \
            -m 'New default Start window: the grid begins at the block containing the roster anchor (daily HH:MM SA time or the once-off start) and runs to now - no dead grey hours before doors. Rolling 12/24/48h stay as options; monitors without an anchor fall back to a rolling 24h. Long anchored windows keep the most recent 288 blocks and say so.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- server/dataHealth.js client/src/components/DataHealthAdmin.jsx test/dataHealth.test.js
          git commit -m 'Data health timeline: window anchored to the roster start time' \
            -m 'Timeline default Start window begins at the roster anchor instead of a rolling window. Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-startwin.patch .github/workflows/apply-datahealth-startwin.yml
          git commit -m "chore: remove one-shot start-window helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
