name: Apply owl data-health window analysis
# ONE-SHOT helper (same pattern as the earlier data-health jobs): decodes the
# reviewed patch (gzip -> base64, sha256-verified after decode), applies it to
# the feature branch, copies the file onto main, then deletes itself from this
# (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode + verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          base64 -d patches/owlwin.gz.b64 | gunzip > /tmp/d.patch
          echo "0ea6bea85a2fb43380652572c61b9a8ffbe45a6311acccc9c3eeb5b49077af35  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index -3 /tmp/d.patch
          git commit -m 'Owl data health: report offline-window trends, not raw blocks' \
            -m 'The dataHealth timeline result now carries the same per-block coverage series the Diagnose uses, plus an explicit steer: analyse the windows where several devices were simultaneously silent (a station''s own connectivity degrading - no cross-station evidence needed) vs isolated device faults vs ramp-up, and answer with those windows. Tool description updated so when-did-devices-go-offline / offline-trend questions route here.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- server/owlTools.js
          git commit -m 'Owl data health: report offline-window trends, not raw blocks' \
            -m 'File copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/owlwin.gz.b64 .github/workflows/apply-datahealth-owlwin.yml
          git commit -m "chore: remove one-shot owlwin helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
