name: Apply data-health report visuals
# ONE-SHOT helper (same pattern as the earlier data-health jobs): decodes the
# reviewed patch (gzip -> base64, with a 2-line splice fixing a transcription
# slip at lines 13-14, sha256-verified after decode), applies it to the feature
# branch, copies the files onto main, then deletes itself from this (default)
# branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode + verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          { head -12 patches/repviz.gz.b64; cat patches/repviz.fix1314; tail -n +15 patches/repviz.gz.b64; } | base64 -d | gunzip > /tmp/d.patch
          echo "e5548359df425e1c6453e67e2f6a85c43e8abf9ec8912274f746c9283ba073fc  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index -3 /tmp/d.patch
          git commit -m 'Data health: scans/h on tiles; per-station connectivity trends + charts in the report' \
            -m 'Collapsed tiles show total scans and average scans per hour (stored on the roster snapshot by check). Report section 4 rewritten: connectivity is analysed PER STATION - each station has its own coverage area, so simultaneous multi-device drops at one bar ARE a connectivity signal for that bar even when other stations ran clean; the section describes each station''s offline trend (windows, depth, recurrence, affected devices). The report panel renders computed metric tiles and per-station coverage strip charts above the AI text.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- server/dataHealth.js client/src/components/DataHealthAdmin.jsx
          git commit -m 'Data health: scans/h on tiles; per-station connectivity trends + charts in the report' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/repviz.gz.b64 patches/repviz.fix1314 .github/workflows/apply-datahealth-repviz.yml
          git commit -m "chore: remove one-shot repviz helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
