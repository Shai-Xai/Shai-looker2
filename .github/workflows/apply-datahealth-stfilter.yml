name: Apply data-health station filter
# ONE-SHOT helper (same pattern as the earlier data-health jobs): applies the
# reviewed patch to the feature branch, copies the files onto main, then deletes
# itself from this (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-stfilter.patch /tmp/d.patch
          echo "e17ff1212e5455ba245d3b8406cf0a7deb32a0b130df20fa1357205fb2e85f0f  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/d.patch
          git commit -m 'Data health: per-station timeline filter, transaction wording, closed-station totals' \
            -m 'Busy bar/vendor monitors overflowed the timeline 5000-row cap (one row per sale at sub-hour blocks), so most blocks rendered grey and the grid stopped at 150 devices. The timeline now aggregates in Looker via the minuteN sibling dimension when the LookML has it (memoized fallback to the raw dim), reads up to 20000 rows, reports devicesTotal, and takes a station filter -- surfaced as a station dropdown on the Timeline panel (admin + client + Owl) so a monitor spanning 30 bars can be read one station at a time.' \
            -m 'Bar/Vendor monitors now speak in transactions, not scans (tiles, dashboard metrics, timeline, report and AI prompts carry the unit), and a closed station frozen day totals still count in Total scans/txns -- only its devices leave the fleet numbers.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- client/src/components/DataHealthAdmin.jsx server/dataHealth.js server/owlTools.js test/dataHealth.test.js
          git commit -m 'Data health: per-station timeline filter, transaction wording, closed-station totals' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-stfilter.patch .github/workflows/apply-datahealth-stfilter.yml
          git commit -m "chore: remove one-shot stfilter helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
