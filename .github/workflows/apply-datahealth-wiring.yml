name: Apply data-health wiring
# ONE-SHOT helper. The session that authored the data-health feature could only
# write through the GitHub API (git push is unavailable there), and the three
# wiring targets (server/index.js, client/src/lib/api.js,
# client/src/pages/AdminPage.jsx) are too large to round-trip through the API
# safely — so the small reviewed patch in patches/datahealth-wiring.patch (on
# the feature branch) is applied here instead. The job pushes the finished
# feature branch, swaps main to the branch tip (lease-guarded, erasing the
# helper commit main briefly carried), and finally deletes this file from the
# default branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch:
    inputs:
      expected_main:
        description: SHA main must still be at (guards the main push)
        required: true

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/looker-data-monitoring-jeo2l9
          fetch-depth: 0
      - name: Apply wiring patch, push branch + main, clean up
        env:
          EXPECTED_MAIN: ${{ github.event.inputs.expected_main }}
        run: |
          set -euo pipefail
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git apply --index patches/datahealth-wiring.patch
          git rm -q patches/datahealth-wiring.patch
          git rm -q --ignore-unmatch .github/workflows/apply-datahealth-wiring.yml
          git commit -m "Data health: wire the module into index.js, the client api and the Admin nav"
          git push origin HEAD:claude/looker-data-monitoring-jeo2l9
          # Main briefly carried an earlier copy of this helper; swap in the
          # finished branch tip (fails instead of clobbering if anything else
          # landed on main meanwhile).
          git push --force-with-lease=refs/heads/main:"$EXPECTED_MAIN" origin HEAD:main
          # Self-cleanup: remove this workflow from the default branch.
          git fetch origin claude/ecstatic-thompson-vUFsS
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch .github/workflows/apply-datahealth-wiring.yml
          git commit -m "chore: remove one-shot data-health wiring workflow" || echo "nothing to clean"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
