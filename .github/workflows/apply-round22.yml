name: apply-round22
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply round 22 and push
        run: |
          set -e
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          echo "e8a12b0f31c23f83991692d6d4341340e0c3ede7a76bbb4a740d476ce8a330d8  patches/round22.patch" | sha256sum -c -
          cp patches/round22.patch /tmp/round22.patch
          cat > /tmp/msg <<'MSG'
          Station-type chips on Live and Stations tabs

          Both station lists gain kind chips (All / gate / bar / vendor / booth /
          topup / other, with counts, only kinds the event actually has) - tap to
          narrow, tap again to clear; combines with the Stations tab's text filter.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          F="client/src/components/EventOpsConsole.jsx"
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero /tmp/round22.patch
          git add $F
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git pull origin main
          git checkout claude/looker-data-monitoring-jeo2l9 -- $F
          git add $F
          git commit -F /tmp/msg
          for i in 1 2 3 4; do git push origin main && break || git pull --rebase origin main; done
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round22.patch .github/workflows/apply-round22.yml
          git commit -m "chore: clean round22 helpers"
          git push origin claude/ecstatic-thompson-vUFsS
