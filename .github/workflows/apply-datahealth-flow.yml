name: Apply data-health flow score
# ONE-SHOT helper (same pattern as the earlier data-health jobs): decodes the
# reviewed patch (gzip -> base64, sha256-verified after decode), applies it to
# the feature branch, copies the files onto main, then deletes itself from this
# (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode + verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          base64 -d patches/flow.gz.b64 | gunzip > /tmp/d.patch
          echo "215fcbf8f20390547fba6094dd4e6947cf178ca303b76396199e5de92cd32e80  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index -3 /tmp/d.patch
          git commit -m 'Data health: Flow score - one number for device-fleet health' \
            -m 'Per station and aggregated on the dashboard: 60% uptime (average share of linked devices sending per block across the day), 20% continuity (share of blocks with any data - the connectivity dimension), 20% throughput (last-hour scan rate vs the day''s average, capped). Computed by check() from the same coverage read, stored on the snapshot; shown as a colored flow chip on each tile (>=85 green, 60-84 amber, <60 red; hover for the component breakdown) and as the first tile of the permanent metrics row (linked-device-weighted across stations).' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- server/dataHealth.js client/src/components/DataHealthAdmin.jsx
          git commit -m 'Data health: Flow score - one number for device-fleet health' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/flow.gz.b64 .github/workflows/apply-datahealth-flow.yml
          git commit -m "chore: remove one-shot flow helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
