name: apply-round4
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/ecstatic-thompson-vUFsS
          fetch-depth: 0
      - name: apply and push
        run: |
          set -euo pipefail
          echo "d4f00f921fdd58b0279af21acf58e71c98a543d75bd9561485dc4e6e695eb499  patches/round4.patch" | sha256sum -c -
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          cp patches/round4.patch /tmp/p.patch
          cat > /tmp/msg <<'EOF'
          Timeline: bucket by _raw when minuteN is missing + a visible read path

          The check-ins family has no minuteN timeframes, and this LookML's
          picked _time timeframe silently drops rows in aggregate reads (the
          MAX-roster disease) - so gate timelines bucketed by _time came back
          empty: 0 devices, 0 scans, flow 0. Sub-hour reads now try minuteN,
          then _raw, then the picked dim; hourly reads fall through to _raw
          too. An empty result from a counting mode is a soft failure like
          all-zeros, and even plain presence only accepts an empty window on
          the last bucket shape. When a grid still comes back empty the
          response carries the read path plus a sample row when rows arrived
          but none fit - the Timeline panel renders both.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          EOF
          sed -i 's/^          //' /tmp/msg
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/p.patch
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git checkout claude/looker-data-monitoring-jeo2l9 -- server/dataHealth.js test/dataHealth.test.js client/src/components/DataHealthAdmin.jsx
          git commit -F /tmp/msg
          git push origin main || { git pull --rebase origin main && git push origin main; }
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round4.patch .github/workflows/apply-round4.yml
          git commit -m "chore: remove one-shot apply helper"
          git push origin claude/ecstatic-thompson-vUFsS
