name: Apply data-health open filters
# ONE-SHOT helper (same pattern as the earlier data-health jobs): the authoring
# session can only write through the GitHub API, so this applies the small
# reviewed patch to the feature branch AND main, then deletes itself from this
# (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch to feature branch + main, then self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-openf.patch /tmp/d.patch
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          MSG='Data health: "open" filters survive a save'
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index /tmp/d.patch
          git commit -m "$MSG"
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git apply --index /tmp/d.patch
          git commit -m "$MSG"
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-openf.patch .github/workflows/apply-datahealth-openf.yml
          git commit -m "chore: remove one-shot open-filters helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
