name: apply-round7
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/ecstatic-thompson-vUFsS
          fetch-depth: 0
      - name: apply and push
        run: |
          set -euo pipefail
          echo "faabd336cd7a90e8eb613e97447d6df97f753c2b3a5d6e8da73129d7ed1acee8  patches/round7.patch" | sha256sum -c -
          echo "0f7b9e7a2322d47e2aea251ea5a3eb002e7ca72e8d323f5f24b9d1ffbe62e7ba  patches/EventSignal7.jsx" | sha256sum -c -
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          cp patches/round7.patch /tmp/p.patch
          cp patches/EventSignal7.jsx /tmp/EventSignal.jsx
          cat > /tmp/msg <<'MSG'
          Timeline failures name their reason; board deep dive gets Retry

          A total live-read failure now throws a client-safe 502 carrying the
          real Looker message and the tail of the read path instead of the
          generic 500 mask, and the board's deep dive shows it with a Retry
          button - live reads can hiccup mid-event and the fix is usually
          just trying again.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/p.patch
          cp /tmp/EventSignal.jsx client/src/components/EventSignal.jsx
          git add client/src/components/EventSignal.jsx
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git checkout claude/looker-data-monitoring-jeo2l9 -- server/dataHealth.js client/src/components/EventSignal.jsx
          git commit -F /tmp/msg
          git push origin main || { git pull --rebase origin main && git push origin main; }
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round7.patch patches/EventSignal7.jsx .github/workflows/apply-round7.yml
          git commit -m "chore: remove one-shot apply helper"
          git push origin claude/ecstatic-thompson-vUFsS
