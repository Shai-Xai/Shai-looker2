name: Apply data-health 10-min tile graph
# ONE-SHOT helper (same pattern as the earlier data-health jobs): applies the
# reviewed patch to the feature branch, copies the files onto main, then deletes
# itself from this (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-cov10.patch /tmp/d.patch
          echo "72ed73250f0d3e8dd6ca75d4e0eae15511441b32b04cd8a496fd804891966743  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/d.patch
          git commit -m 'Data health: tile day-graph at 10-minute resolution' \
            -m 'The dashboard tiles devices-online-through-the-day graph stored one bar per hour, hiding the short dropouts the live timeline surfaces. The snapshot coverage series is now built from 10-minute blocks (same single read the totals already use); the tile chart tightens its bars for the denser series. The flow score keeps judging uptime/continuity by HOUR -- a bar that sells once an hour is not down for five of its six blocks.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- client/src/components/DataHealthAdmin.jsx server/dataHealth.js
          git commit -m 'Data health: tile day-graph at 10-minute resolution' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-cov10.patch .github/workflows/apply-datahealth-cov10.yml
          git commit -m "chore: remove one-shot cov10 helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
