name: Apply data-health value filters + closed status
# ONE-SHOT helper (same pattern as the earlier data-health jobs): assembles the
# reviewed patch (1-line splice fixes a transcription slip at line 187),
# sha256-verifies it, applies it to the feature branch, copies the files onto
# main, then deletes itself from this (default) branch. Safe to delete by hand
# if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Assemble + verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          { head -186 patches/datahealth-valclosed.patch; cat patches/valclosed.fix187; tail -n +188 patches/datahealth-valclosed.patch; } > /tmp/d.patch
          echo "9ca15432ddbbb12d1fbf0d2c562bfee612a806b90bc0206347149e4885dac7a5  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index -3 /tmp/d.patch
          git commit -m 'Data health: event-constrained filter values + mark a station as closed' \
            -m 'Filter-value dropdowns now carry the editor''s other filled-in filters - set the Cashless Events Name filter and the station list narrows to that event''s stations only; both templates gain an event-name filter row. New Mark closed / Reopen on every monitor: a gate that shuts for the night is silence by design - closed stations stop being checked, never alert, show a neutral CLOSED badge, and drop out of the platform banner, group counts and dashboard metrics until reopened.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- server/dataHealth.js client/src/components/DataHealthAdmin.jsx
          git commit -m 'Data health: event-constrained filter values + mark a station as closed' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-valclosed.patch patches/valclosed.fix187 .github/workflows/apply-datahealth-valclosed.yml
          git commit -m "chore: remove one-shot valclosed helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
