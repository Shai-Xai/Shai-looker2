name: apply-round29
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply round 29 and push
        run: |
          set -e
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          echo "911e2322ef48c568e2fdd003c59a04c5ab6d3850f7c6c26033dea0d41f797bb1  patches/round29.patch" | sha256sum -c -
          cp patches/round29.patch /tmp/round29.patch
          cat > /tmp/msg <<'MSG'
          Staff portal My Alerts + acknowledge; offline stacked on the day timeline

          - Every firing writes a per-staff alert feed row (eventops_staff_alert).
            The staff portal shows "My station alerts" newest-first with an
            I'm-on-it / Ack-all button; token-gated portal routes fetch + ack.
            Hive -> Alerts gains an "Acknowledged - who's on it" panel.
          - The Data health day timeline stacks the offline (linked-but-silent)
            share in red on top of the green online bars; coverage carries a
            per-block linked total. Older snapshots render green-only, unchanged.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          F="server/dataHealth.js server/staffAlerts.js server/eventops.js client/src/components/DataHealthAdmin.jsx client/src/components/StaffAlertsTab.jsx client/src/pages/EventOpsPortalPage.jsx test/staffAlerts.test.js"
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero /tmp/round29.patch
          git add $F
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git pull origin main
          git checkout claude/looker-data-monitoring-jeo2l9 -- $F
          git add $F
          git commit -F /tmp/msg
          for i in 1 2 3 4; do git push origin main && break || git pull --rebase origin main; done
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round29.patch .github/workflows/apply-round29.yml
          git commit -m "chore: clean round29 helpers"
          git push origin claude/ecstatic-thompson-vUFsS
