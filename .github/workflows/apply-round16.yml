name: apply-round16
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply round 16 and push
        run: |
          set -e
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          echo "ca2a917c9f022c11b78007cd5266f0186c99917127f328a549a3ea8177f78b3d  patches/round16.patch" | sha256sum -c -
          cp patches/round16.patch /tmp/round16.patch
          cat > /tmp/msg <<'MSG'
          Replay drags the whole board; trend follows darkness; Needs Eyes folds away

          - Dragging the Event pulse now time-travels the entire board: tiles,
            zones, dials and the flow meter repaint to that moment's device state,
            with a Replay banner and Back to LIVE. Station labels now ride into
            the observed log so darkness lands on the right station.
          - Last 60 min verdict follows the dark direction only (more dark =
            worse, fewer = improving, 40%+ recovered = "Big improvement") and all
            its numbers scope to the active filter chip instead of the whole site.
          - Needs Eyes collapses to a one-line count (red/amber) by default.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          F="client/src/components/EventSignal.jsx server/dataHealth.js"
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero /tmp/round16.patch
          git add $F
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git pull origin main
          git checkout claude/looker-data-monitoring-jeo2l9 -- $F
          git commit -F /tmp/msg
          for i in 1 2 3 4; do git push origin main && break || git pull --rebase origin main; done
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round16.patch .github/workflows/apply-round16.yml
          git commit -m "chore: clean round16 helpers"
          git push origin claude/ecstatic-thompson-vUFsS
