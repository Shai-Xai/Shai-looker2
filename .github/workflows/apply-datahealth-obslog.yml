name: Apply data-health observed log
# ONE-SHOT helper (same pattern as the earlier data-health jobs): applies the
# reviewed patch to the feature branch, copies the files onto main, then deletes
# itself from this (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-obslog.patch /tmp/d.patch
          echo "235866e83bf5a7cd503bb1132a5fd71734ba629fa8f0bb8c678da0a6a3c4d2d7  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/d.patch
          git commit -m 'Data health: observed offline log, catalogue count probe, per-line offline devices' \
            -m 'The transaction timeline can be repainted by a device that traded offline and synced late -- useless for proving WHEN a device was unreachable. Every check now records what Pulse SAW (who was offline at that moment) in data_monitor_obs; an Offline log timeline mode renders that per device per check (red = seen offline, never backfilled), the tile day-graph reads the observed series once it has history, the AI diagnose/report get observedOfflineWindows as the authoritative connectivity record, and the Owl gains query=observed.' \
            -m 'Bar/vendor totals read absurdly low because BOTH count_distinct variants fail on this Looker (custom fields likely disallowed for the API user), leaving row presence: one count per device-block. The probe now also asks the explore catalogue for the sales view own count measures and tries those before the dynamic ones. Offline drill-down panel lists one device per line.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- client/src/components/DataHealthAdmin.jsx server/dataHealth.js server/owlTools.js test/dataHealth.test.js
          git commit -m 'Data health: observed offline log, catalogue count probe, per-line offline devices' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-obslog.patch .github/workflows/apply-datahealth-obslog.yml
          git commit -m "chore: remove one-shot obslog helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
