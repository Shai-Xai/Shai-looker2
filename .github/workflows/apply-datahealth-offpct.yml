name: Apply data-health offline percent
# ONE-SHOT helper (same pattern as the earlier data-health jobs): applies the
# reviewed patch to the feature branch, copies the files onto main, then
# deletes itself from this (default) branch. Safe to delete by hand if it ever
# lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-offpct.patch /tmp/d.patch
          echo "0e49ee01166f3b3971c91df20d00dbe524515b065d6e89cc9c4c8894077e1f59  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index -3 /tmp/d.patch
          git commit -m 'Data health: offline % everywhere + which stations/devices are offline' \
            -m 'Tiles and the dashboard Offline metric show the offline share as a percentage of linked devices. New Offline-by-station line under the metrics row: each station''s offline count + %, worst first; hovering a station (or a tile''s offline count) lists WHICH devices are offline and for how long - the snapshot stores the worst 15 offline devices per station.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- server/dataHealth.js client/src/components/DataHealthAdmin.jsx
          git commit -m 'Data health: offline % everywhere + which stations/devices are offline' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-offpct.patch .github/workflows/apply-datahealth-offpct.yml
          git commit -m "chore: remove one-shot offpct helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
