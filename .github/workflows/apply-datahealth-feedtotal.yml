name: Apply data-health feed total
# ONE-SHOT helper (same pattern as the earlier data-health jobs): applies the
# reviewed patch to the feature branch, copies the files onto main, then deletes
# itself from this (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-feedtotal.patch /tmp/d.patch
          echo "12f4ac2093e4db1d690b76a40509794bb64bb72f965d8304e74f4c8f578b4005  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/d.patch
          git commit -m 'Data health: headline Total shows the whole feed day figure' \
            -m 'The headline summed only what the monitors watch (bar+vendor slices since the start time) -- always short of the real day. Each check now also reads the WHOLE feed day total (same explore and event scope, station/category narrowing dropped) using the working count measure, stores it on the snapshot, and the dashboard Total scans/txns tiles show that figure -- one per feed, never a sum of overlapping monitors -- falling back to the monitored sum where no measure works.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- client/src/components/DataHealthAdmin.jsx server/dataHealth.js test/dataHealth.test.js
          git commit -m 'Data health: headline Total shows the whole feed day figure' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-feedtotal.patch .github/workflows/apply-datahealth-feedtotal.yml
          git commit -m "chore: remove one-shot feedtotal helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
