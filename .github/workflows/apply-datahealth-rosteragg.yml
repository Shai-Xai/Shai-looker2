name: Apply data-health roster aggregation
# ONE-SHOT helper (same pattern as the earlier data-health jobs): applies the
# reviewed patch to the feature branch, copies the files onto main, then deletes
# itself from this (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-rosteragg.patch /tmp/d.patch
          echo "d83c2222e96ec2905eac3f0eeb62116262dc2403de3535394fee382415131009  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/d.patch
          git commit -m 'Data health: aggregate roster reads, reject zero-only count measures' \
            -m 'The roster read pulled raw rows (one per sale) and hit the 5000-row cap on a busy day, silently dropping idle devices -- linked/offline counts jittered between pulls (58 offline on one read, 20 on the next). The roster now asks Looker for ONE row per device (dynamic MAX of the time dim), falling back to the raw read where the measure cannot run, and remembers which worked per monitor.' \
            -m 'On the combined explore the guessed native count measure exists but counts another view rows, returning 0 for every row -- the timeline rendered all-grey and the snapshot froze at 0 transactions / flow 0. A count mode whose rows all read 0 is now a soft failure: the probe moves to the dynamic count_distinct (real numbers) or plain row presence.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- server/dataHealth.js test/dataHealth.test.js
          git commit -m 'Data health: aggregate roster reads, reject zero-only count measures' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-rosteragg.patch .github/workflows/apply-datahealth-rosteragg.yml
          git commit -m "chore: remove one-shot rosteragg helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
