# Litestream — continuous SQLite replication to R2/S3 (seconds of data loss
# instead of "since last night's snapshot"). Reuses the SAME BACKUP_S3_* env
# vars as server/backup.js, under a separate key prefix, so one bucket + one
# credential pair covers both layers:
#   litestream/…      ← this (streaming WAL generations)
#   pulse-<stamp>.gz  ← nightly snapshots (server/backup.js)
#
# Restore (new/empty disk, BEFORE first boot):
#   ./litestream restore -config scripts/litestream/litestream.yml "$DATA_DIR/howler.db"
# Then start the service normally. See scripts/litestream/README.md.

dbs:
  - path: ${DATA_DIR}/howler.db
    replicas:
      - type: s3
        endpoint: ${BACKUP_S3_ENDPOINT}
        bucket: ${BACKUP_S3_BUCKET}
        path: litestream
        access-key-id: ${BACKUP_S3_ACCESS_KEY}
        secret-access-key: ${BACKUP_S3_SECRET_KEY}
        region: auto
        # Keep ~3 days of point-in-time restore; snapshots hourly keep the
        # WAL chain short so restores stay fast.
        retention: 72h
        snapshot-interval: 1h
        sync-interval: 1s
