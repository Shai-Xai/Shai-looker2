name: Apply data-health collapsed peek
# ONE-SHOT helper (same pattern as the earlier data-health jobs): the authoring
# session can only write through the GitHub API, so this applies the reviewed
# patch to the feature branch, copies the resulting data-health files onto main,
# then deletes itself from this (default) branch. Safe to delete by hand if it
# ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply to feature branch, sync main, then self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-peek.patch /tmp/d.patch
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index /tmp/d.patch
          git commit -m 'Data health: station chips + roster counts on collapsed cards; expand opens the timeline' \
            -m 'Collapsed rows now show the station chips (status dot, name, lag) and the roster counts - N linked (seen since ...) / N online / N offline (no sync in Xm) - so a collapsed list is already a triage view. The counts come from a roster snapshot check() now stores on each pull (new roster_snapshot column, cleared when the roster setup changes), so collapsed cards cost no extra Looker queries. Expanding a roster monitor opens straight onto the Timeline tab, and the timeline defaults to 10-minute blocks.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- server/dataHealth.js client/src/components/DataHealthAdmin.jsx test/dataHealth.test.js
          git commit -m 'Data health: station chips + roster counts on collapsed cards; expand opens the timeline' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-peek.patch .github/workflows/apply-datahealth-peek.yml
          git commit -m "chore: remove one-shot peek helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
