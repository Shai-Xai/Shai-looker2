name: apply-round25
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply round 25 and push
        run: |
          set -e
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          echo "44a1e7dd21746a60ea5f114e68768bd298147617e3ba713fb3b7b4872187d270  patches/round25.patch" | sha256sum -c -
          cp patches/round25.patch /tmp/round25.patch
          cat > /tmp/msg <<'MSG'
          Staff portal push (phase 2a): alerts reach the person at the station

          Staff have no Pulse account, only a portal login by number - so alerts
          now ride web-push keyed by staff id:
          - push.js exposes sendRaw + vapidPublicKey (generic transport for modules
            that own their own subscription table).
          - eventops.js: token-gated portal routes push-key / push / push-off, an
            eventops_staff_push table keyed by staff id (no account needed).
          - The staff portal PWA gets a 'Alerts' toggle in the staff header -
            request permission, subscribe, register - reusing the existing service
            worker (same origin, already handles push + notification taps).
          - staffAlerts sendToStaff pushes the assigned crew's own phones once an
            event is live (test mode still contacts only the admin); Hive -> Alerts
            shows a bell next to reachable staff.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          F="server/push.js server/eventops.js server/staffAlerts.js server/index.js client/src/components/StaffAlertsTab.jsx client/src/pages/EventOpsPortalPage.jsx test/staffAlerts.test.js docs/PRODUCT_OVERVIEW_SALES.md"
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero /tmp/round25.patch
          git add $F
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git pull origin main
          git checkout claude/looker-data-monitoring-jeo2l9 -- $F
          git add $F
          git commit -F /tmp/msg
          for i in 1 2 3 4; do git push origin main && break || git pull --rebase origin main; done
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round25.patch .github/workflows/apply-round25.yml
          git commit -m "chore: clean round25 helpers"
          git push origin claude/ecstatic-thompson-vUFsS
