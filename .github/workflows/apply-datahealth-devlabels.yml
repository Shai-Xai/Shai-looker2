name: Apply data-health device labels
# ONE-SHOT helper (same pattern as the earlier data-health jobs): applies the
# reviewed patch to the feature branch, copies the files onto main, then deletes
# itself from this (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-devlabels.patch /tmp/d.patch
          echo "d58a5cd5ad3344fae61ce5a4b0dc8e265de95b2038f3fadc6ca523cb5df7061a  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/d.patch
          git commit -m 'Data health: station + operator labels on the live Devices and Timeline panels' \
            -m 'Device ids alone are hard to place. The Devices (live) offline table and the Timeline (live) rows (blocks and counts modes) now carry each device latest station and operator, matching what Latest 20 shows. The labels come from ONE separate aggregated lookup (latest row per device) so the extra joins can never distort the count reads -- a label failure costs labels, nothing else. Scheduled checks skip the lookup; the live panels, the AI diagnostics payload and the Owl timeline get it.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- client/src/components/DataHealthAdmin.jsx server/dataHealth.js server/owlTools.js test/dataHealth.test.js
          git commit -m 'Data health: station + operator labels on the live Devices and Timeline panels' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-devlabels.patch .github/workflows/apply-datahealth-devlabels.yml
          git commit -m "chore: remove one-shot devlabels helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
