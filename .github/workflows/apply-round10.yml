name: apply-round10
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/ecstatic-thompson-vUFsS
          fetch-depth: 0
      - name: apply and push
        run: |
          set -euo pipefail
          echo "40ed78aa2456754697005eb15a1d011c9a639b62043ea266fe47760ce5fc6c39  patches/round10.patch" | sha256sum -c -
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          cp patches/round10.patch /tmp/p.patch
          cat > /tmp/msg <<'MSG'
          Memoized read shapes self-heal; report beside the Owl; offline card

          - A memoized bucket/count mode is now the first candidate, never
            the only one - date_minute30 memoized healthy then turning blank
            killed the FUTUR drill-down with no fallback. Also a bucket with
            half or more blank values counts as broken (the union view
            populates minuteN only for some row families).
          - Client Data health tab: the Draft health report sits beside the
            Owl summary (stacked on phones), and the offline-by-station
            breakdown gets its own card.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/p.patch
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git checkout claude/looker-data-monitoring-jeo2l9 -- server/dataHealth.js test/dataHealth.test.js client/src/components/DataHealthAdmin.jsx
          git commit -F /tmp/msg
          git push origin main || { git pull --rebase origin main && git push origin main; }
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round10.patch .github/workflows/apply-round10.yml
          git commit -m "chore: remove one-shot apply helper"
          git push origin claude/ecstatic-thompson-vUFsS
