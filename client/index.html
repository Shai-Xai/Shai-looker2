<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Warm the connection to Inventive's embed host so the analyst loads faster -->
    <link rel="preconnect" href="https://app.madeinventive.com" crossorigin />
    <link rel="dns-prefetch" href="https://app.madeinventive.com" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <!-- Installable app (PWA) + push -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ff385c" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pulse" />
    <title>Howler : Pulse</title>
    <style>
      /* Instant splash so a hard load / cold start never shows a blank screen
         before the JS bundle boots. React replaces #root's contents on mount. */
      html, body { margin: 0; height: 100%; background: #f5f6f8; }
      @media (prefers-color-scheme: dark) { html, body { background: #0e0e11; } }
      #app-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #app-splash .mark {
        width: 52px; height: 52px; border-radius: 14px; overflow: hidden;
        background: linear-gradient(135deg, #FF385C 0%, #FF6B35 45%, #7C3AED 100%);
        box-shadow: 0 10px 30px -8px rgba(124,58,237,0.5);
        animation: splash-pulse 1.4s ease-in-out infinite;
      }
      #app-splash .mark img { width: 100%; height: 100%; object-fit: cover; display: block; }
      #app-splash .word { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; color: #86868b; }
      #app-splash .bar { width: 120px; height: 3px; border-radius: 999px; background: rgba(128,128,128,0.18); overflow: hidden; }
      #app-splash .bar i { display: block; height: 100%; width: 40%; border-radius: 999px;
        background: linear-gradient(90deg, #FF385C, #FF6B35, #7C3AED); animation: splash-slide 1.1s ease-in-out infinite; }
      @keyframes splash-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.9); opacity: 0.7; } }
      @keyframes splash-slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
      @media (prefers-reduced-motion: reduce) { #app-splash .mark, #app-splash .bar i { animation: none; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <div class="mark"><img src="/logo.png" alt="Howler : Pulse" onerror="this.remove()" /></div>
        <div class="word">Howler&nbsp;:&nbsp;Pulse</div>
        <div class="bar"><i></i></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
