# Render Blueprint for Howler : Pulse
# Render → New → Blueprint → connect this repo. Review, then set the secret
# env vars (marked sync:false) in the dashboard and deploy.
#
# Notes:
#  - A persistent disk holds the SQLite database (DATA_DIR), so data survives
#    redeploys. This requires a paid instance type (free tier has no disk and
#    spins down).
#  - Run ONE instance (SQLite is single-file). Don't scale to >1 until you
#    migrate storage to Postgres (see DEPLOY.md).
#  - Render injects PORT automatically; the server already reads process.env.PORT.
services:
  - type: web
    name: howler-pulse
    runtime: node
    plan: starter
    branch: main
    # Root install is production-only (the server needs no devDeps). Installing
    # root devDeps pulls Playwright, which downloads a ~150MB browser on every
    # deploy — the slow build. The client build DOES need its devDeps (Vite), so
    # keep --include=dev there.
    buildCommand: npm ci --omit=dev && npm --prefix client ci --include=dev && npm --prefix client run build
    startCommand: node server/index.js
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 1
    disk:
      name: pulse-data
      mountPath: /var/lib/pulse
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/lib/pulse
      - key: SESSION_SECRET
        generateValue: true        # Render generates a strong secret once
      - key: MASTER_KEY
        generateValue: true        # encrypts integration secrets at rest (server/secretbox.js).
                                    # KEEP A COPY: restoring a backup needs this exact value.
      - key: ADMIN_EMAIL
        sync: false                # set in dashboard (first-boot admin login)
      - key: ADMIN_PASSWORD
        sync: false
      - key: LOOKER_BASE_URL
        sync: false                # or set later in Admin → Integrations
      - key: LOOKER_CLIENT_ID
        sync: false
      - key: LOOKER_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Off-box DB backups (server/backup.js). Local nightly snapshots always run;
      # set these to also copy them off the disk (Cloudflare R2 / S3 / B2) — the
      # disk is a single point of failure until you do.
      - key: BACKUP_S3_ENDPOINT
        sync: false               # e.g. https://<accountid>.r2.cloudflarestorage.com
      - key: BACKUP_S3_BUCKET
        sync: false
      - key: BACKUP_S3_ACCESS_KEY
        sync: false
      - key: BACKUP_S3_SECRET_KEY
        sync: false
      # Internal ops alerts (server/ops.js): a Howler-internal Slack incoming
      # webhook — backup/digest/mailer failures page a human instead of only
      # writing to the log stream.
      - key: OPS_SLACK_WEBHOOK_URL
        sync: false
