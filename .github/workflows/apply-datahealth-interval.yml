name: Apply data-health timeline block intervals
# ONE-SHOT helper (same pattern as the earlier data-health jobs): the authoring
# session can only write through the GitHub API, so this applies the reviewed
# patch to the feature branch, then copies the resulting data-health files onto
# main (which also picks up the already-approved timeline commit), then deletes
# itself from this (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply to feature branch, sync main, then self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-interval.patch /tmp/d.patch
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index /tmp/d.patch
          git commit -m 'Data health timeline: selectable block interval (5/10/20/30/60 min)' \
            -m '60-min blocks keep the Looker hour-sibling aggregation; finer blocks read the raw time dimension and bucket server-side (grid capped at 288 blocks). Red device name now means nothing in the last ~30 minutes at any block size.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- server/dataHealth.js client/src/components/DataHealthAdmin.jsx test/dataHealth.test.js
          git commit -m 'Data health: per-device day timeline (5-60 min blocks) + daily roster anchor' \
            -m 'Approved timeline view: per-device activity grid with selectable block interval (5/10/20/30/60 min) and 12/24/48h windows, plus the recurring daily roster anchor (HH:MM SA time) for multi-day events. Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-interval.patch .github/workflows/apply-datahealth-interval.yml
          git commit -m "chore: remove one-shot interval helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
