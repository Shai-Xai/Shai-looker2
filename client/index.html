<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Howler — Looker Dashboard Recreator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #ff385c;
      --brand-dark: #e0002b;
      --bg: #f7f7f7;
      --card: #ffffff;
      --border: #e0e0e0;
      --text: #222222;
      --muted: #717171;
      --success: #008a00;
      --error: #c0392b;
      --warn: #b45309;
      --radius: 12px;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 0 var(--border);
    }

    .logo {
      width: 32px;
      height: 32px;
      background: var(--brand);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { fill: white; }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 13px;
      color: var(--muted);
      border-left: 1px solid var(--border);
      padding-left: 12px;
      margin-left: 4px;
    }

    /* ── Main Layout ── */
    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 560px;
      padding: 36px 40px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* ── Form ── */
    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    label .hint {
      font-weight: 400;
      color: var(--muted);
      margin-left: 4px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: var(--card);
      transition: border-color 0.15s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--brand);
    }

    input[type="text"]::placeholder { color: #aaa; }

    /* Preview badge */
    #preview-badge {
      display: none;
      margin-top: 8px;
      padding: 8px 12px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      font-size: 13px;
      color: var(--success);
    }

    #preview-badge.error {
      background: #fff5f5;
      border-color: #fecaca;
      color: var(--error);
    }

    /* Preview button */
    .btn-preview {
      flex-shrink: 0;
      padding: 10px 16px;
      background: #f7f7f7;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      color: var(--text);
    }

    .btn-preview:hover { background: #ebebeb; border-color: #bbb; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* Submit */
    #submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.2px;
    }

    #submit-btn:hover:not(:disabled) { background: var(--brand-dark); }
    #submit-btn:active:not(:disabled) { transform: scale(0.99); }
    #submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Result Panel ── */
    #result {
      display: none;
      margin-top: 24px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .result-header {
      padding: 14px 18px;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-header.success { background: #f0fdf4; color: var(--success); border-bottom: 1px solid #bbf7d0; }
    .result-header.partial { background: #fffbeb; color: var(--warn); border-bottom: 1px solid #fde68a; }
    .result-header.failure { background: #fff5f5; color: var(--error); border-bottom: 1px solid #fecaca; }

    .result-body { padding: 16px 18px; font-size: 13px; }

    .stat-row {
      display: flex;
      gap: 24px;
      margin-bottom: 14px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 20px; font-weight: 700; }
    .stat-value.green { color: var(--success); }
    .stat-value.red { color: var(--error); }

    .open-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: var(--brand);
      color: white;
      text-decoration: none;
      border-radius: 7px;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 14px;
      transition: background 0.15s;
    }

    .open-link:hover { background: var(--brand-dark); }

    .error-list {
      list-style: none;
      margin-top: 4px;
    }

    .error-list li {
      padding: 7px 10px;
      background: #fff5f5;
      border-left: 3px solid var(--error);
      border-radius: 0 4px 4px 0;
      color: var(--error);
      font-size: 12px;
      margin-bottom: 6px;
      line-height: 1.4;
      word-break: break-word;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <!-- Simple music note icon representing Howler/events -->
    <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 3v11.5a3.5 3.5 0 1 0 2 3.13V8h7V3H9zm-1.5 16a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zM11 6V5h5v1h-5z"/>
    </svg>
  </div>
  <h1>Howler</h1>
  <span>Looker Dashboard Recreator</span>
</header>

<main>
  <div class="card">
    <div class="card-title">Recreate a Dashboard</div>
    <div class="card-subtitle">
      Copy an existing Looker dashboard — including all tiles and filters —
      into a new dashboard. Useful for spinning up per-event analytics views.
    </div>

    <form id="form" novalidate>

      <!-- Source Dashboard ID -->
      <div class="field">
        <label for="source-id">
          Source Dashboard ID
          <span class="hint">— the dashboard to copy</span>
        </label>
        <div class="input-row">
          <input
            type="text"
            id="source-id"
            placeholder="e.g. 42"
            autocomplete="off"
            required
          />
          <button type="button" class="btn-preview" id="preview-btn">Preview</button>
        </div>
        <div id="preview-badge"></div>
      </div>

      <hr class="divider" />

      <!-- New Dashboard Title -->
      <div class="field">
        <label for="new-title">
          New Dashboard Title
          <span class="hint">— name for the copy</span>
        </label>
        <input
          type="text"
          id="new-title"
          placeholder="e.g. Howler — Glastonbury 2025"
          required
        />
      </div>

      <!-- Target Folder ID -->
      <div class="field">
        <label for="folder-id">
          Target Folder ID
          <span class="hint">— Looker folder to save into</span>
        </label>
        <input
          type="text"
          id="folder-id"
          placeholder="e.g. 7"
          autocomplete="off"
          required
        />
      </div>

      <button type="submit" id="submit-btn">Recreate Dashboard</button>
    </form>

    <!-- Result -->
    <div id="result">
      <div class="result-header" id="result-header"></div>
      <div class="result-body" id="result-body"></div>
    </div>
  </div>
</main>

<footer>Howler Event Management Platform &mdash; Internal Tools</footer>

<script>
  const form       = document.getElementById('form');
  const sourceInput = document.getElementById('source-id');
  const titleInput  = document.getElementById('new-title');
  const folderInput = document.getElementById('folder-id');
  const submitBtn  = document.getElementById('submit-btn');
  const previewBtn = document.getElementById('preview-btn');
  const previewBadge = document.getElementById('preview-badge');
  const resultDiv  = document.getElementById('result');
  const resultHeader = document.getElementById('result-header');
  const resultBody   = document.getElementById('result-body');

  // ── Preview ──────────────────────────────────────────────────────────────────

  previewBtn.addEventListener('click', async () => {
    const id = sourceInput.value.trim();
    if (!id) { sourceInput.focus(); return; }

    previewBadge.style.display = 'none';
    previewBadge.className = '';
    previewBtn.textContent = 'Loading…';
    previewBtn.disabled = true;

    try {
      const res = await fetch(`/api/dashboard/${encodeURIComponent(id)}`);
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Unknown error');

      previewBadge.className = '';
      previewBadge.innerHTML =
        `&#10003; &nbsp;<strong>${escHtml(data.title)}</strong> &mdash; ` +
        `${data.tileCount} tile${data.tileCount !== 1 ? 's' : ''}, ` +
        `${data.filterCount} filter${data.filterCount !== 1 ? 's' : ''}` +
        (data.folder ? ` &mdash; Folder: <em>${escHtml(data.folder)}</em>` : '');
    } catch (err) {
      previewBadge.className = 'error';
      previewBadge.textContent = `Error: ${err.message}`;
    }

    previewBadge.style.display = 'block';
    previewBtn.textContent = 'Preview';
    previewBtn.disabled = false;
  });

  // ── Submit ───────────────────────────────────────────────────────────────────

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const sourceDashboardId = sourceInput.value.trim();
    const newTitle          = titleInput.value.trim();
    const targetFolderId    = folderInput.value.trim();

    if (!sourceDashboardId || !newTitle || !targetFolderId) {
      alert('Please fill in all three fields.');
      return;
    }

    // Show loading state
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>Recreating…';
    resultDiv.style.display = 'none';

    try {
      const res = await fetch('/api/recreate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sourceDashboardId, newTitle, targetFolderId }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Unexpected server error');
        return;
      }

      showResult(data);
    } catch (err) {
      showError(err.message || 'Network error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Recreate Dashboard';
    }
  });

  // ── Result Rendering ─────────────────────────────────────────────────────────

  function showResult(data) {
    const totalTiles   = data.tilesCreated + data.tilesFailed;
    const totalFilters = data.filtersCreated + data.filtersFailed;
    const hasErrors    = data.errors && data.errors.length > 0;
    const allOk        = !hasErrors;

    // Header
    resultHeader.className = 'result-header ' + (allOk ? 'success' : data.tilesCreated > 0 ? 'partial' : 'failure');
    resultHeader.innerHTML = allOk
      ? '&#10003; Dashboard recreated successfully!'
      : (data.tilesCreated > 0
          ? '&#9651; Dashboard recreated with some errors'
          : '&#10007; Recreation failed');

    // Body
    let html = `
      <div class="stat-row">
        <div class="stat">
          <span class="stat-label">Tiles Created</span>
          <span class="stat-value ${data.tilesCreated === totalTiles ? 'green' : 'red'}">
            ${data.tilesCreated}/${totalTiles}
          </span>
        </div>
        <div class="stat">
          <span class="stat-label">Filters Created</span>
          <span class="stat-value ${data.filtersCreated === totalFilters ? 'green' : 'red'}">
            ${data.filtersCreated}/${totalFilters}
          </span>
        </div>
      </div>`;

    if (data.dashboardUrl) {
      html += `
        <a class="open-link" href="${escHtml(data.dashboardUrl)}" target="_blank" rel="noopener">
          &#8599; Open in Looker &mdash; Dashboard ${escHtml(String(data.dashboardId))}
        </a>`;
    }

    if (hasErrors) {
      html += `<div style="margin-top:12px;font-weight:600;font-size:13px;color:var(--error)">Errors</div>
        <ul class="error-list">`;
      data.errors.forEach(err => {
        html += `<li>${escHtml(err)}</li>`;
      });
      html += '</ul>';
    }

    resultBody.innerHTML = html;
    resultDiv.style.display = 'block';
    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showError(message) {
    resultHeader.className = 'result-header failure';
    resultHeader.innerHTML = '&#10007; Error';
    resultBody.innerHTML = `<p style="color:var(--error);font-size:14px">${escHtml(message)}</p>`;
    resultDiv.style.display = 'block';
    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
</script>

</body>
</html>
