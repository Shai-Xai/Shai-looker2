name: apply-round30
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply round 30 and push
        run: |
          set -e
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          echo "9ed7f9a1606222777f499f7a15903614faf840041a2c32cef38b4a50fb349c18  patches/round30.patch" | sha256sum -c -
          cp patches/round30.patch /tmp/round30.patch
          cat > /tmp/msg <<'MSG'
          Day timeline reads the observed log live so offline shows immediately

          The stacked-offline chart was reading the snapshot's frozen coverage,
          which only gains per-block totals on a monitor's next check - so cards
          checked a while ago (and CLOSED gates that never re-check) stayed green.
          The card now fetches the observed log directly (online + total per
          check, always current) and stacks offline from that, falling back to
          the snapshot only when there's no observed history.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          F="client/src/components/DataHealthAdmin.jsx"
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero /tmp/round30.patch
          git add $F
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git pull origin main
          git checkout claude/looker-data-monitoring-jeo2l9 -- $F
          git add $F
          git commit -F /tmp/msg
          for i in 1 2 3 4; do git push origin main && break || git pull --rebase origin main; done
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round30.patch .github/workflows/apply-round30.yml
          git commit -m "chore: clean round30 helpers"
          git push origin claude/ecstatic-thompson-vUFsS
