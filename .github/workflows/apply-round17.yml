name: apply-round17
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply round 17 and push
        run: |
          set -e
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          echo "c046b439237e084d8cce2f25cdd080203dff29bb64ed9add88298531b8966134  patches/round17.patch" | sha256sum -c -
          cp patches/round17.patch /tmp/round17.patch
          cat > /tmp/msg <<'MSG'
          Flow target is settable on the meter (default 95%, saved per device)

          Tap the gear on the Signal flow card to set your own target (50-100%).
          Green at/above target, amber within 5 points below, red under that; the
          meter tick and the allowed-dark wording follow the chosen number.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          F="client/src/components/EventSignal.jsx"
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero /tmp/round17.patch
          git add $F
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git pull origin main
          git checkout claude/looker-data-monitoring-jeo2l9 -- $F
          git commit -F /tmp/msg
          for i in 1 2 3 4; do git push origin main && break || git pull --rebase origin main; done
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round17.patch .github/workflows/apply-round17.yml
          git commit -m "chore: clean round17 helpers"
          git push origin claude/ecstatic-thompson-vUFsS
