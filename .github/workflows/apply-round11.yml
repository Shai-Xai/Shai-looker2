name: apply-round11
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/ecstatic-thompson-vUFsS
          fetch-depth: 0
      - name: apply and push
        run: |
          set -euo pipefail
          echo "ca20625c606908df3bdd5343a2552621a4f82bacabb723aa63573eb24686e06f  patches/round11.patch" | sha256sum -c -
          echo "2f4dc5733f1cb470ac6dad137a778d6ecbc13e7ff3a43ca2b154bd3632abd4d2  patches/EventSignal11.jsx" | sha256sum -c -
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          cp patches/round11.patch /tmp/p.patch
          cp patches/EventSignal11.jsx /tmp/EventSignal.jsx
          cat > /tmp/msg <<'MSG'
          Owl summary matches the platform pattern: AiMark pill + right drawer

          The Data health tab and Signal board now use the same Owl
          affordance as every dashboard - the AiMark Summary pill in the
          header opening the docked right drawer (bottom sheet on phones),
          with regenerate, header and footer Share, and the Owl quips while
          it reads. The inline summary card is gone; the Draft health report
          keeps its spot on the tab.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/p.patch
          cp /tmp/EventSignal.jsx client/src/components/EventSignal.jsx
          git add client/src/components/EventSignal.jsx
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git checkout claude/looker-data-monitoring-jeo2l9 -- client/src/components/EventSignal.jsx client/src/components/DataHealthAdmin.jsx
          git commit -F /tmp/msg
          git push origin main || { git pull --rebase origin main && git push origin main; }
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round11.patch patches/EventSignal11.jsx .github/workflows/apply-round11.yml
          git commit -m "chore: remove one-shot apply helper"
          git push origin claude/ecstatic-thompson-vUFsS
