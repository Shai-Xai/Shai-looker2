name: Apply data-health timeline (feature branch only)
# ONE-SHOT helper (same pattern as the earlier data-health jobs): the authoring
# session can only write through the GitHub API, so this applies the reviewed
# patch to the FEATURE BRANCH ONLY — main stays untouched until the timeline
# mockup is approved — then it deletes itself from this (default) branch.
# Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch to the feature branch, then self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-timeline.patch /tmp/d.patch
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index /tmp/d.patch
          git commit -m 'Data health: daily roster anchor (multi-day) + per-device day timeline' \
            -m 'rosterAnchor(): recurring daily HH:MM (SA time) anchor for multi-day events, falling back to the once-off start / rolling window. deviceTimeline() + /timeline route: per-device hourly activity buckets from Looker. Editor gains a Daily-from (SA time) field; new Timeline tab renders the hour grid. Kept off main until the mockup is approved.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-timeline.patch .github/workflows/apply-datahealth-timeline.yml
          git commit -m "chore: remove one-shot timeline helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
