name: apply-round18
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply round 18 and push
        run: |
          set -e
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          echo "856ae3d45cbb6c840af941ea8a78cfa22c5db9f7b2ff3d1173ac64b67392df26  patches/round18.patch" | sha256sum -c -
          cp patches/round18.patch /tmp/round18.patch
          cat > /tmp/msg <<'MSG'
          Shared flow target, 30-min status journal, roster-truth board on/off

          - GET/PUT /api/my/data-health/flow-target stores ONE target per event
            (suite) so every phone and wall screen agrees; admins and the owning
            client set it through the same board gear. Replaces the per-device
            localStorage version.
          - The Event pulse card grows a "journal" fold-out: every 30-minute
            window, newest first - how many devices came back, how many went
            dark, and the dark count A to B, from the observed logs.
          - Board on/off now follows the roster's lag truth (aggregated read,
            no row cap): a stalled ingest or cropped timeline read must show as
            rising lag and falling volume, not a false all-stations blackout.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          F="client/src/components/EventSignal.jsx server/dataHealth.js"
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero /tmp/round18.patch
          git add $F
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git pull origin main
          git checkout claude/looker-data-monitoring-jeo2l9 -- $F
          git commit -F /tmp/msg
          for i in 1 2 3 4; do git push origin main && break || git pull --rebase origin main; done
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round18.patch .github/workflows/apply-round18.yml
          git commit -m "chore: clean round18 helpers"
          git push origin claude/ecstatic-thompson-vUFsS
