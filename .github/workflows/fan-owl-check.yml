# Fan Owl diagnostics — run on demand (workflow_dispatch) to check things the
# cloud agent sandbox can't reach directly:
#   1. the Pulse app-boot for a site key (is "Allow in Howler app" on?)
#   2. the staging backend's current event list (what the app will show)
# Read-only: a context boot + a public GraphQL query. Safe to run any time.
name: Fan Owl diagnostics

on:
  workflow_dispatch:
    inputs:
      site_key:
        description: Pulse Fan Owl site key (fw_…)
        required: true
        default: fw_5af4e861b8f64e137e11bdf9

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: App boot check (Pulse /api/fan/context, platform howler-app)
        run: |
          echo "== Boot as the Howler app =="
          curl -sS -m 30 -X POST "https://howler-pulse-v2.onrender.com/api/fan/context" \
            -H "Content-Type: application/json" \
            -d "{\"siteKey\":\"${{ inputs.site_key }}\",\"url\":\"app://event/0/store\",\"platform\":\"howler-app\",\"anonId\":\"gh-diag\"}" \
            | python3 -m json.tool || true

      - name: Staging events list (what the app can open)
        run: |
          echo "== Current events on howlerstaging =="
          curl -sS -m 30 -X POST "https://www.howlerstaging.co.za/api/v6/graphql" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ events(first: 40) { edges { node { id name startTime endTime isPastEvent } } } }"}' \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          nodes = [e['node'] for e in d.get('data', {}).get('events', {}).get('edges', [])]
          if not nodes:
              print(json.dumps(d)[:2000])
          for n in nodes:
              flag = 'PAST' if n.get('isPastEvent') else 'LIVE'
              print(f\"{flag}  {n['id']:>8}  {n.get('startTime','')[:10]}  {n['name']}\")
          " || true
