name: apply-round12
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/ecstatic-thompson-vUFsS
          fetch-depth: 0
      - name: apply and push
        run: |
          set -euo pipefail
          echo "d00c9b4646a4699ae386496b2767de1dbdfd7f6b8eff0986f56338b9cf2a2d79  patches/EventSignal12.jsx" | sha256sum -c -
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          cp patches/EventSignal12.jsx /tmp/EventSignal.jsx
          cat > /tmp/msg <<'MSG'
          Rhythm view: the rate river on the board + pulse line in the modal

          The board gains a Board/Rhythm toggle. Rhythm shows the whole
          site's stacked hourly total (transactions green, scans blue) and
          one heat-strip row per station on a shared clock - colour depth =
          pace, day's avg/h on the right; tapping a row opens the station
          modal. The modal itself gains the station's pulse line: hourly
          bars with the peak hour flagged and the day's average. All from
          each monitor's existing hourly day timeline.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          git checkout claude/looker-data-monitoring-jeo2l9
          cp /tmp/EventSignal.jsx client/src/components/EventSignal.jsx
          git add client/src/components/EventSignal.jsx
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git checkout claude/looker-data-monitoring-jeo2l9 -- client/src/components/EventSignal.jsx
          git commit -F /tmp/msg
          git push origin main || { git pull --rebase origin main && git push origin main; }
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/EventSignal12.jsx .github/workflows/apply-round12.yml
          git commit -m "chore: remove one-shot apply helper"
          git push origin claude/ecstatic-thompson-vUFsS
