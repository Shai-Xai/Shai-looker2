name: apply-round26
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply round 26 and push
        run: |
          set -e
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          echo "b0160ef1af1e222d856d8c18cf79c5f35fc86c50d450305488394e7b811912c2  patches/round26.patch" | sha256sum -c -
          cp patches/round26.patch /tmp/round26.patch
          cat > /tmp/msg <<'MSG'
          Portal alerts: guide iPhone users to Add to Home Screen

          iOS only allows web-push from an installed PWA, never a Safari tab, so
          the Alerts button used to just vanish on iPhone. Now it detects iOS +
          not-standalone and shows a short how-to (Share -> Add to Home Screen ->
          reopen -> tap the bell) instead of hiding. Android is unchanged: tap and
          accept, no install.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          F="client/src/pages/EventOpsPortalPage.jsx"
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero /tmp/round26.patch
          git add $F
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git pull origin main
          git checkout claude/looker-data-monitoring-jeo2l9 -- $F
          git add $F
          git commit -F /tmp/msg
          for i in 1 2 3 4; do git push origin main && break || git pull --rebase origin main; done
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round26.patch .github/workflows/apply-round26.yml
          git commit -m "chore: clean round26 helpers"
          git push origin claude/ecstatic-thompson-vUFsS
