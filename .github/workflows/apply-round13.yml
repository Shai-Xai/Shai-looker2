name: apply-round13
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/ecstatic-thompson-vUFsS
          fetch-depth: 0
      - name: apply and push
        run: |
          set -euo pipefail
          echo "bc53a4838aca1578590fb8449a47e28129d7f94a022f6a25e2bf04b90213f6e0  patches/round13.patch" | sha256sum -c -
          echo "9534e44f7f3742f462208356ac3fa8c1c6578760b54f5d05ef16274bda5941da  patches/EventSignal13.jsx" | sha256sum -c -
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          cp patches/round13.patch /tmp/p.patch
          cp patches/EventSignal13.jsx /tmp/EventSignal.jsx
          cat > /tmp/msg <<'MSG'
          Mobile polish, full-width modal charts, tap readouts; drop duplicate report button

          - The Hive sub-drawer starts closed, so Event Ops lands on just
            Hive, Data health and Signal board.
          - Data health / Signal board intro paragraphs wrap under the header
            buttons on phones instead of being squeezed into a one-word
            column.
          - The modal's day graph and pulse line stretch the full width with
            five hour stamps across the axis, and tapping (or hovering) any
            bar pins its readout in the chart header.
          - The client tab's Draft health report button is gone - the Owl
            Summary drawer runs the same report with Share built in.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/p.patch
          cp /tmp/EventSignal.jsx client/src/components/EventSignal.jsx
          git add client/src/components/EventSignal.jsx
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git checkout claude/looker-data-monitoring-jeo2l9 -- client/src/components/EventSignal.jsx client/src/components/DataHealthAdmin.jsx client/src/components/EventOpsConsole.jsx
          git commit -F /tmp/msg
          git push origin main || { git pull --rebase origin main && git push origin main; }
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round13.patch patches/EventSignal13.jsx .github/workflows/apply-round13.yml
          git commit -m "chore: remove one-shot apply helper"
          git push origin claude/ecstatic-thompson-vUFsS
