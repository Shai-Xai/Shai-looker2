name: Apply data-health metrics split
# ONE-SHOT helper (same pattern as the earlier data-health jobs): applies the
# reviewed patch to the feature branch, copies the files onto main, then deletes
# itself from this (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-split.patch /tmp/d.patch
          echo "88c13fdc931ccbe5b0317012ff0ac555a2d623dc351fd261569f0cb315b39fca  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/d.patch
          git commit -m 'Data health: split scans vs transactions, station-grouped timeline, offline drill-down' \
            -m 'Scans (gates) and transactions (bars/vendors) are different metrics: the dashboard and report volume tiles now show one set per unit, never a combined sum. The counts view stops showing 1s on bar monitors -- the dynamic count_distinct, like the MAX read, must be based on the _raw timeframe on this explore (falls back to the picked timeframe).' \
            -m 'The timeline header shows the in-view online/offline summary (exact last-seen lag from the labels lookup), the All-stations view groups device rows under per-station headers with their own counts, and clicking a tile offline count opens the live offline device list split by station (device, silence, operator). Sales overview changelog updated.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- client/src/components/DataHealthAdmin.jsx docs/PRODUCT_OVERVIEW_SALES.md server/dataHealth.js test/dataHealth.test.js
          git commit -m 'Data health: split scans vs transactions, station-grouped timeline, offline drill-down' \
            -m 'Files copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-split.patch .github/workflows/apply-datahealth-split.yml
          git commit -m "chore: remove one-shot split helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
