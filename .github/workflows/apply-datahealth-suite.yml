name: Apply data-health suite
# ONE-SHOT helper (same pattern as the earlier data-health jobs): the authoring
# session can only write through the GitHub API, so this decodes the reviewed
# patch (base64, 3 parts, sha256-verified), applies it to MAIN (the patch was
# authored against the current main tip — shared files like index.js/owlTools
# had drifted from the feature branch), snapshots the touched files onto the
# feature branch to keep it in parity, then deletes itself from this (default)
# branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode + verify patch, apply to main, snapshot branch, self-clean
        run: |
          set -euo pipefail
          cat patches/suite.b64.part00 patches/suite.b64.part01 patches/suite.b64.part02 | base64 -d > /tmp/d.patch
          echo "3cdcb47afbcb8dd471c3ea258db3d829332f639d56304920fd3be5dea8057257  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin main claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git apply --index -3 /tmp/d.patch
          git commit -m 'Data health: client Event Ops tab, platform overview, AI diagnose + event report, fleet alert, Owl/MCP access' \
            -m 'Client-facing Data health tab in Event Ops (read-only, entity-enforced /api/my/data-health routes). Admin page: platform-health banner + monitors grouped by client x event with drill-in. AI: per-station Diagnose and an event-level Data health & diagnostics report (Markdown; copy/download/print - ops use + network-provider shareable), prompts registered in the AI audit. Fleet alert: optional alert when >= X% of linked devices are offline (edge-detected, cooldown-shared, 3+ devices), with recovery notice. Owl tool dataHealth on chat + WhatsApp, pulse_data_health on MCP and /api/v1/data-health (read_rows scope). Sales overview updated.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git checkout mwork -- server/dataHealth.js server/insights.js server/owlTools.js server/api.js server/mcp.js server/index.js client/src/components/DataHealthAdmin.jsx client/src/components/EventOpsConsole.jsx test/dataHealth.test.js docs/PRODUCT_OVERVIEW_SALES.md
          git commit -m 'Data health: client Event Ops tab, platform overview, AI diagnose + event report, fleet alert, Owl/MCP access' \
            -m 'Touched files snapshotted verbatim from main after the suite patch (shared files had drifted; main is the deploy truth).' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/suite.b64.part00 patches/suite.b64.part01 patches/suite.b64.part02 .github/workflows/apply-datahealth-suite.yml
          git commit -m "chore: remove one-shot suite helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
