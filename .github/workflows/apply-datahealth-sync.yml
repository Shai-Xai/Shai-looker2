name: Sync data-health component from main
# ONE-SHOT helper: another session improved DataHealthAdmin.jsx on main
# (grouped field pickers); copy main's version onto the feature branch so the
# two stay identical for future patches. Deletes itself afterwards.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Copy component from main to the feature branch, then self-clean
        run: |
          set -euo pipefail
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git checkout origin/main -- client/src/components/DataHealthAdmin.jsx
          if git diff --cached --quiet && git diff --quiet; then echo "already in sync"; else
            git add client/src/components/DataHealthAdmin.jsx
            git commit -m "Data health: adopt main's grouped field pickers (optgroup per view)"
            git push origin work:claude/looker-data-monitoring-jeo2l9
          fi
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch .github/workflows/apply-datahealth-sync.yml
          git commit -m "chore: remove one-shot component-sync helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
