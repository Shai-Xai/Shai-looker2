name: apply-round23
on: workflow_dispatch
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply round 23 and push
        run: |
          set -e
          git config user.name "Shai-Xai"
          git config user.email "shai.evian@howler.co.za"
          echo "4ba3f48f41f3fef5826c38f41e381c89202a2f4ccdcf9a1b088f89075872c29a  patches/round23.patch" | sha256sum -c -
          cp patches/round23.patch /tmp/round23.patch
          cat > /tmp/msg <<'MSG'
          Mobile: abbreviate big KPI numbers; collapse Live stations to chips; filter Alerts

          - Single-value tiles on phones abbreviate figures over 10k (2,701,926 ->
            2.7M, 896,486 -> 896K, 48,469 -> 48.5K) so the number never outgrows its
            tile; currency prefixes survive, percentages and decimals stay exact,
            desktop keeps the full figure, drill still shows every digit.
          - Live landing Stations: show the type chips only by default (Show all /
            Gate / Bar / Vendor / ...), the card grid stays collapsed until you pick
            one - a 60-station event no longer floods the landing.
          - Hive -> Alerts gains status chips (All / Alerting / Has dark / Unmapped /
            No staff, with counts) plus a name search once the board passes six.

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>
          Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB
          MSG
          sed -i 's/^          //' /tmp/msg
          F="client/src/components/tiles/SingleValueTile.jsx client/src/components/EventOpsConsole.jsx client/src/components/StaffAlertsTab.jsx"
          git checkout claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero /tmp/round23.patch
          git add $F
          git commit -F /tmp/msg
          git push origin claude/looker-data-monitoring-jeo2l9
          git checkout main
          git pull origin main
          git checkout claude/looker-data-monitoring-jeo2l9 -- $F
          git add $F
          git commit -F /tmp/msg
          for i in 1 2 3 4; do git push origin main && break || git pull --rebase origin main; done
          git checkout claude/ecstatic-thompson-vUFsS
          git rm -q patches/round23.patch .github/workflows/apply-round23.yml
          git commit -m "chore: clean round23 helpers"
          git push origin claude/ecstatic-thompson-vUFsS
