name: Apply data-health combined mode
# ONE-SHOT helper (same pattern as the earlier data-health jobs): applies the
# reviewed patch to the feature branch, copies the file onto main, then deletes
# itself from this (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-combined.patch /tmp/d.patch
          echo "66a648dcc00532dab77e4e709c972d3e53c1e2b36f15b7220203ecd44f7c1328  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --unidiff-zero --index /tmp/d.patch
          git commit -m 'Data health: Combined timeline mode -- data vs connectivity per block' \
            -m 'Fuses the transaction blocks with the observed offline log into one grid: green = online + data, amber = seen OFFLINE at a check yet the data synced later (connectivity blip, sales intact), red = offline and NO data (down and not trading), grey = online but quiet. Amber/red only paint where the observed log has coverage, and the mode says so while the log is still young.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- client/src/components/DataHealthAdmin.jsx
          git commit -m 'Data health: Combined timeline mode -- data vs connectivity per block' \
            -m 'File copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-combined.patch .github/workflows/apply-datahealth-combined.yml
          git commit -m "chore: remove one-shot combined helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
