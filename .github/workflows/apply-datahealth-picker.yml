name: Apply data-health field picker
# ONE-SHOT helper (same pattern as the earlier data-health jobs): applies the
# reviewed patch to the feature branch, copies the file onto main, then deletes
# itself from this (default) branch. Safe to delete by hand if it ever lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify patch, apply to branch, sync main, self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-picker.patch /tmp/d.patch
          echo "89b5617108f7561ab439611a2894ec432f97293aff0e2208920fca51d0bd8721  /tmp/d.patch" | sha256sum -c -
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index -3 /tmp/d.patch
          git commit -m 'Data health editor: searchable field picker with collapsible family sections' \
            -m 'Replaces the native select field dropdowns (hundreds of flat Looker fields) with a picker: type to search across every family by label or field name, families render as collapsible section headers with counts (collapsed by default, the selected field''s section open), and optional Whole-feed / No-roster entries stay at the top. Used for the timestamp, station split, device roster, Latest-20 columns and filter dimensions.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- client/src/components/DataHealthAdmin.jsx
          git commit -m 'Data health editor: searchable field picker with collapsible family sections' \
            -m 'File copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-picker.patch .github/workflows/apply-datahealth-picker.yml
          git commit -m "chore: remove one-shot picker helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
