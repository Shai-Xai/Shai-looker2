name: Apply data-health collapsed cards
# ONE-SHOT helper (same pattern as the earlier data-health jobs): the authoring
# session can only write through the GitHub API, so this applies the reviewed
# patch to the feature branch, copies the resulting file onto main, then
# deletes itself from this (default) branch. Safe to delete by hand if it ever
# lingers.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply to feature branch, sync main, then self-clean
        run: |
          set -euo pipefail
          cp patches/datahealth-collapse.patch /tmp/d.patch
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git fetch origin claude/looker-data-monitoring-jeo2l9 main
          git checkout -B work origin/claude/looker-data-monitoring-jeo2l9
          git apply --index /tmp/d.patch
          git commit -m 'Data health: collapse monitor cards to summary rows; full-height live tabs' \
            -m 'Cards now start collapsed to one row (status dot, name, stream/status summary, last-checked) so a page with many monitors stays scannable; click the row to expand the full card, which opens with the log showing. The live tabs (Latest 20 / Devices / Timeline) drop the 260px letterbox so a big device timeline is visible in full - only Activity and Pull log keep the inner scroll.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin work:claude/looker-data-monitoring-jeo2l9
          git checkout -B mwork origin/main
          git checkout work -- client/src/components/DataHealthAdmin.jsx
          git commit -m 'Data health: collapse monitor cards to summary rows; full-height live tabs' \
            -m 'File copied verbatim from the feature branch.' \
            -m 'Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>' \
            -m 'Claude-Session: https://claude.ai/code/session_01TagcJraLcEJPw3PuBibLMB'
          git push origin mwork:main
          git checkout -B defclean origin/claude/ecstatic-thompson-vUFsS
          git rm -q --ignore-unmatch patches/datahealth-collapse.patch .github/workflows/apply-datahealth-collapse.yml
          git commit -m "chore: remove one-shot collapse helper"
          git push origin defclean:claude/ecstatic-thompson-vUFsS
